<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Right Click Computers | Premium Sales & Service</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #03050d; color: white; overflow-x: hidden; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-slide-in-right { animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.8s ease-out forwards; }
        
        @keyframes scrollLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-scroll-left { animation: scrollLeft 20s linear infinite; }
        
        @keyframes pulse-slow { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .animate-pulse-slow { animation: pulse-slow 3s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // ==========================================
        // 🚀 LIVE GOOGLE SHEETS DATABASE URL
        // ==========================================
        const GOOGLE_SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbxVemzlfo2MEBg45kAyWRIPxbHfor9MokQ7RZJAtf-GsCVbBNs6BIHZql-4QM_S8eeV/exec"; 
        // ==========================================

        // --- STORE DATA ---
        const PRODUCTS = [
            { id: 1, name: "Corsair Vengeance 16GB DDR5 RAM", category: "Components", price: 21990, image: "https://images.unsplash.com/photo-1562976540-1502c2145186?auto=format&fit=crop&w=400&q=80", rating: 4.8, reviews: 124 },
            { id: 2, name: "Crucial P3 Plus 1TB NVMe SSD", category: "Components", price: 19000, image: "https://images.unsplash.com/photo-1597848212624-a19eb35e2651?auto=format&fit=crop&w=400&q=80", rating: 4.9, reviews: 89 },
            { id: 3, name: "Logitech G502 Hero Gaming Mouse", category: "Accessories", price: 3390, image: "https://images.unsplash.com/photo-1595225476474-87563907a212?auto=format&fit=crop&w=400&q=80", rating: 4.7, reviews: 312 },
            { id: 4, name: "GIGABYTE 25-Inch IPS FHD 240Hz Monitor", category: "Displays", price: 11499, image: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?auto=format&fit=crop&w=400&q=80", rating: 4.5, reviews: 67 },
            { id: 5, name: "Ant Esports MK1300 V2 Mechanical Keyboard", category: "Accessories", price: 1550, image: "https://images.unsplash.com/photo-1595044426077-d36d9236d54a?auto=format&fit=crop&w=400&q=80", rating: 4.6, reviews: 145 },
            { id: 6, name: "ASUS Dual RX 7600 EVO 8GB GPU", category: "Components", price: 26075, image: "https://images.unsplash.com/photo-1591488320449-011701bb6704?auto=format&fit=crop&w=400&q=80", rating: 4.8, reviews: 42 },
            { id: 7, name: "Apple iMac 24-inch (M3)", category: "Desktops", price: 134900, image: "https://images.unsplash.com/photo-1611186871348-b1ce696e52c9?auto=format&fit=crop&w=400&q=80", rating: 4.9, reviews: 28 },
            { id: 8, name: "Portronics Toad 27 Wireless Mouse", category: "Accessories", price: 322, image: "https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7?auto=format&fit=crop&w=400&q=80", rating: 4.2, reviews: 512 }
        ];

        const CATEGORIES = ["All", "Components", "Accessories", "Displays", "Desktops"];
        const CURRENT_YEAR = new Date().getFullYear();
        const PREFIX = `RC${CURRENT_YEAR}`;

        const REVIEW_TEMPLATES = [
            "Right Click Computers provided an amazing service! My laptop works like new.",
            "Highly professional and fast repairs. Excellent experience with Right Click.",
            "Custom gaming PC assembly was flawless. Very satisfied with the expertise.",
            "MacBook screen replacement done quickly and efficiently. Great team!"
        ];

        const BrandLogo = () => (
            <div className="flex items-center gap-3 cursor-pointer">
                <div className="relative w-10 h-10 drop-shadow-[0_0_8px_rgba(250,204,21,0.5)]">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" className="w-full h-full">
                        <path d="M12 4L19 19L12 16L12 4Z" fill="#FACC15" />
                        <path d="M12 4L5 19L12 16L12 4Z" fill="#FFFFFF" />
                        <rect x="9.5" y="11" width="5" height="7" rx="2.5" stroke="#18181B" strokeWidth="0.75" fill="transparent"/>
                        <line x1="9.5" y1="14" x2="14.5" y2="14" stroke="#18181B" strokeWidth="0.75"/>
                        <line x1="12" y1="11" x2="12" y2="14" stroke="#18181B" strokeWidth="0.75"/>
                    </svg>
                </div>
                <div className="flex flex-col -gap-1">
                    <div className="flex items-baseline gap-1">
                        <span className="font-black text-2xl tracking-wide text-white">RIGHT</span>
                        <span className="font-bold text-xl text-zinc-300">Click</span>
                    </div>
                    <span className="text-[10px] font-bold tracking-[0.25em] text-yellow-500 uppercase leading-none">Computers</span>
                </div>
            </div>
        );

        function App() {
            const [currentView, setCurrentView] = useState("store");
            const [toastMessage, setToastMessage] = useState("");
            
            // Fixes Google Sheets raw ISO Dates to display beautifully
            const formatDate = (dateStr) => {
                if (!dateStr) return "";
                if (typeof dateStr === 'string' && dateStr.includes("T") && dateStr.includes("Z")) {
                    return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                }
                return dateStr;
            };

            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [activeCategory, setActiveCategory] = useState("All");
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isCheckoutModalOpen, setIsCheckoutModalOpen] = useState(false);
            
            const [trackingSerial, setTrackingSerial] = useState("");
            const [trackingMobile, setTrackingMobile] = useState(""); 
            const [searchedTicket, setSearchedTicket] = useState(null);
            const [trackingError, setTrackingError] = useState("");
            
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [loginUsername, setLoginUsername] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            const [loginError, setLoginError] = useState("");

            const [ticketsData, setTicketsData] = useState({});
            const [editingTicketId, setEditingTicketId] = useState(null);
            const [editFormData, setEditFormData] = useState({});
            const [isCreateModalOpen, setIsCreateModalOpen] = useState(false);
            const [newTicketForm, setNewTicketForm] = useState({ serialNumber: "", customer: "", mobile: "", device: "", issue: "", cost: "Pending" });

            const [isReviewAssistOpen, setIsReviewAssistOpen] = useState(false);
            const [generatedReview, setGeneratedReview] = useState("");

            // --- DATABASE SYNC ---
            const loadLocalData = () => {
                const saved = localStorage.getItem('rightclick_tickets');
                if (saved) setTicketsData(JSON.parse(saved));
                else setTicketsData({}); // Clean slate
            };

            useEffect(() => {
                if (GOOGLE_SHEETS_API_URL) {
                    fetch(GOOGLE_SHEETS_API_URL)
                        .then(res => res.json())
                        .then(data => {
                            setTicketsData(data || {}); // Loads empty object if sheet is empty
                        })
                        .catch(err => {
                            console.error("Failed to connect to Google Sheets, using Local Storage", err);
                            loadLocalData();
                        });
                } else {
                    loadLocalData();
                }
            }, []);

            const saveDataToCloudOrLocal = (data) => {
                setTicketsData(data); 
                
                if (GOOGLE_SHEETS_API_URL) {
                    fetch(GOOGLE_SHEETS_API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify(data)
                    }).catch(err => console.error("Cloud Save Error:", err));
                } else {
                    localStorage.setItem('rightclick_tickets', JSON.stringify(data));
                }
            };

            // --- AUTO DELETE SCRIPT ---
            useEffect(() => {
                const cleanupInterval = setInterval(() => {
                    setTicketsData(prevData => {
                        const now = Date.now();
                        const THREE_DAYS_IN_MS = 3 * 24 * 60 * 60 * 1000;
                        let hasDeletes = false;
                        const cleanedData = { ...prevData };

                        for (const ticketId in cleanedData) {
                            const ticket = cleanedData[ticketId];
                            if (ticket.status === 'Delivered' && ticket.deliveredAt) {
                                if (now - ticket.deliveredAt > THREE_DAYS_IN_MS) {
                                    delete cleanedData[ticketId];
                                    hasDeletes = true;
                                }
                            }
                        }
                        
                        if (hasDeletes) {
                            saveDataToCloudOrLocal(cleanedData);
                            return cleanedData;
                        }
                        return prevData;
                    });
                }, 60000); 
                return () => clearInterval(cleanupInterval);
            }, []);

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(""), 3000);
            };

            const filteredProducts = useMemo(() => {
                if (activeCategory === "All") return PRODUCTS;
                return PRODUCTS.filter(p => p.category === activeCategory);
            }, [activeCategory]);

            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
                    return [...prev, { ...product, quantity: 1 }];
                });
                showToast(`Added ${product.name} to cart`);
            };

            const updateQuantity = (id, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.id === id) return { ...item, quantity: Math.max(0, item.quantity + delta) };
                    return item;
                }).filter(item => item.quantity > 0));
            };

            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            const formatINR = (amount) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(amount);

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (loginUsername.toLowerCase() === 'rightclick' && loginPassword === '9059895427') {
                    setIsAdminAuthenticated(true);
                    setCurrentView('admin');
                    setLoginError(''); setLoginUsername(''); setLoginPassword('');
                    showToast("Secure Login Successful");
                } else {
                    setLoginError("Invalid username or password.");
                }
            };

            const handleAdminLogout = () => {
                setIsAdminAuthenticated(false);
                setCurrentView('store');
                showToast("Logged out successfully");
            };

            const handleCreateTicket = (e) => {
                e.preventDefault();
                const customId = `${PREFIX}-${newTicketForm.serialNumber.trim()}`.toUpperCase();
                
                if (ticketsData[customId]) { showToast("Error: Ticket ID exists!"); return; }

                const newTicket = {
                    customer: newTicketForm.customer, mobile: newTicketForm.mobile,
                    device: newTicketForm.device, issue: newTicketForm.issue,
                    status: "Received", date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
                    cost: newTicketForm.cost || "Pending"
                };

                const updatedData = { ...ticketsData, [customId]: newTicket };
                saveDataToCloudOrLocal(updatedData);
                
                setIsCreateModalOpen(false);
                setNewTicketForm({ serialNumber: "", customer: "", mobile: "", device: "", issue: "", cost: "Pending" });
                showToast(`Created: ${customId}`);
            };

            const saveTicketEdit = (id) => {
                const updatedTicket = { ...editFormData };
                if (updatedTicket.status === 'Delivered' && ticketsData[id].status !== 'Delivered') {
                    updatedTicket.deliveredAt = Date.now();
                }
                const updatedData = { ...ticketsData, [id]: updatedTicket };
                saveDataToCloudOrLocal(updatedData);
                setEditingTicketId(null);
                showToast(`Updated ${id}`);
            };

            const processCheckout = () => {
                let orderText = `Hello Right Click Computers! I would like to securely place an order:%0A%0A`;
                cart.forEach(item => {
                    orderText += `▪ ${item.quantity}x ${item.name} (${formatINR(item.price * item.quantity)})%0A`;
                });
                orderText += `%0A*Total Value: ${formatINR(cartTotal)}*%0A%0AHow should I proceed with the payment?`;
                window.open(`https://wa.me/919059895427?text=${orderText}`, '_blank');
                setIsCheckoutModalOpen(false);
                setCart([]); 
                showToast("Opening WhatsApp...");
            };

            return (
                <div className="min-h-screen flex flex-col relative">
                    
                    {toastMessage && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[9999] bg-zinc-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 animate-bounce border border-yellow-500/50">
                            <i className="fas fa-check-circle text-yellow-400"></i>
                            <span className="font-bold text-sm">{toastMessage}</span>
                        </div>
                    )}

                    <div className="fixed bottom-8 right-8 z-50 flex flex-col gap-4">
                        <button onClick={() => { setGeneratedReview(REVIEW_TEMPLATES[Math.floor(Math.random() * REVIEW_TEMPLATES.length)]); setIsReviewAssistOpen(true); }} className="w-14 h-14 bg-yellow-400 text-black rounded-full flex items-center justify-center shadow-[0_10px_25px_rgba(0,0,0,0.5)] hover:scale-110 transition-transform animate-pulse-slow">
                            <i className="fas fa-star text-2xl"></i>
                        </button>
                        <a href="https://wa.me/919059895427" target="_blank" className="w-14 h-14 bg-[#25d366] text-white rounded-full flex items-center justify-center shadow-[0_10px_25px_rgba(0,0,0,0.5)] hover:scale-110 transition-transform">
                            <i className="fab fa-whatsapp text-3xl"></i>
                        </a>
                    </div>

                    {isReviewAssistOpen && (
                        <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-md" onClick={() => setIsReviewAssistOpen(false)}></div>
                            <div className="bg-zinc-900/90 border border-yellow-400/30 backdrop-blur-xl p-8 rounded-3xl w-full max-w-lg relative z-10 animate-slide-in-right">
                                <button onClick={() => setIsReviewAssistOpen(false)} className="absolute top-4 right-4 text-zinc-400 hover:text-white"><i className="fas fa-times"></i></button>
                                <h2 className="text-2xl font-black text-white mb-2 flex items-center gap-2"><i className="fas fa-star text-yellow-400"></i> Review Assistant</h2>
                                <p className="text-zinc-400 mb-6 text-sm">Help us grow by leaving a quick 5-star review!</p>
                                <textarea readOnly value={generatedReview} className="w-full h-32 bg-black/50 border border-yellow-400/20 rounded-xl p-4 text-white font-medium resize-none focus:outline-none focus:border-yellow-400 transition-colors mb-4"/>
                                <div className="flex gap-3">
                                    <button onClick={() => { navigator.clipboard.writeText(generatedReview); showToast("Copied!"); }} className="flex-1 bg-yellow-400 hover:bg-yellow-500 text-black font-bold py-3 rounded-xl flex items-center justify-center gap-2"><i className="fas fa-copy"></i> Copy Review</button>
                                    <a href="https://g.page/r/CZ6XNQ1f9WZNEBM/review" target="_blank" className="flex-1 bg-white hover:bg-zinc-200 text-black font-bold py-3 rounded-xl flex items-center justify-center gap-2 text-center">Write on Google</a>
                                </div>
                            </div>
                        </div>
                    )}

                    {isCheckoutModalOpen && (
                        <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-md" onClick={() => setIsCheckoutModalOpen(false)}></div>
                            <div className="bg-zinc-900 border border-yellow-400/30 p-8 rounded-[30px] w-full max-w-md relative z-10 animate-slide-in-right">
                                <button onClick={() => setIsCheckoutModalOpen(false)} className="absolute top-5 right-5 text-zinc-400 hover:text-white bg-white/5 p-2 rounded-full"><i className="fas fa-times"></i></button>
                                <div className="text-center mb-6 mt-2">
                                    <div className="w-20 h-20 bg-yellow-400/10 text-yellow-400 rounded-full flex items-center justify-center mx-auto mb-5 border border-yellow-400/20"><i className="fas fa-shield-alt text-4xl"></i></div>
                                    <h2 className="text-3xl font-black text-white mb-3">Secure Checkout</h2>
                                    <p className="text-zinc-400 text-sm leading-relaxed">To guarantee your financial security, <strong className="text-white">we never ask for card details on our website.</strong> Please confirm your order directly with our team via WhatsApp to proceed with payment safely.</p>
                                </div>
                                <div className="bg-black/50 rounded-2xl p-5 mb-6 border border-white/5 shadow-inner">
                                    <div className="flex justify-between text-sm mb-2 text-zinc-400 font-bold"><span>Total Items:</span> <span className="text-white">{cartCount}</span></div>
                                    <div className="flex justify-between text-xl font-black text-white pt-2 border-t border-white/10 mt-2"><span>Total Cost:</span> <span className="text-yellow-400">{formatINR(cartTotal)}</span></div>
                                </div>
                                <button onClick={processCheckout} className="w-full bg-[#25d366] hover:bg-[#20bd5a] text-white py-4 rounded-xl font-black text-lg shadow-[0_0_25px_rgba(37,211,102,0.25)] transition-all flex justify-center items-center gap-3">
                                    <i className="fab fa-whatsapp text-2xl"></i> Confirm on WhatsApp
                                </button>
                            </div>
                        </div>
                    )}

                    <nav className="fixed w-full top-0 z-40 bg-[#03050d]/80 backdrop-blur-lg border-b border-white/5">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-24">
                            <div onClick={() => setCurrentView('store')}><BrandLogo /></div>
                            <div className="hidden md:flex items-center space-x-8">
                                <button onClick={() => setCurrentView("store")} className={`font-bold transition-colors ${currentView === 'store' ? 'text-yellow-400' : 'text-zinc-300 hover:text-yellow-400'}`}>Store</button>
                                <button onClick={() => setCurrentView("tracking")} className={`font-bold transition-colors ${currentView === 'tracking' ? 'text-yellow-400' : 'text-zinc-300 hover:text-yellow-400'}`}>Repair Tracking</button>
                                <a href="tel:+919059895427" className="text-yellow-400 font-bold tracking-wider hover:text-yellow-300">CALL EXPERT</a>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsCartOpen(true)} className="relative p-2 text-zinc-300 hover:text-white hover:bg-white/10 rounded-full transition-colors">
                                    <i className="fas fa-shopping-cart text-2xl"></i>
                                    {cartCount > 0 && <span className="absolute -top-1 -right-1 bg-yellow-400 text-black text-[11px] font-black h-5 w-5 rounded-full flex items-center justify-center border-2 border-[#03050d]">{cartCount}</span>}
                                </button>
                                <button className="md:hidden p-2 text-zinc-300" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}><i className="fas fa-bars text-2xl"></i></button>
                            </div>
                        </div>
                    </nav>

                    {isMobileMenuOpen && (
                        <div className="md:hidden fixed top-24 w-full bg-zinc-900 border-b border-white/10 p-4 shadow-2xl z-40">
                            <div className="flex flex-col gap-4">
                                <button onClick={() => { setCurrentView("store"); setIsMobileMenuOpen(false); }} className="font-bold text-left p-3 rounded-xl bg-white/5">Store</button>
                                <button onClick={() => { setCurrentView("tracking"); setIsMobileMenuOpen(false); }} className="font-bold text-left p-3 rounded-xl bg-white/5">Repair Tracking</button>
                            </div>
                        </div>
                    )}

                    <div className="flex-grow pt-24">
                        
                        {currentView === "store" && (
                            <>
                                <div className="relative h-[80vh] flex items-center justify-center overflow-hidden">
                                    <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80" className="absolute inset-0 w-full h-full object-cover opacity-30 mix-blend-luminosity" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-[#03050d] via-transparent to-[#03050d]"></div>
                                    <div className="relative z-10 text-center max-w-4xl px-4 animate-fade-in-up">
                                        <p className="text-yellow-400 font-bold tracking-[5px] uppercase mb-4 text-sm">Premier IT Hub Midhilapur</p>
                                        <h1 className="text-5xl md:text-7xl font-black text-white mb-6 leading-tight">Expertise You Can <span className="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-200 drop-shadow-[0_0_20px_rgba(255,215,0,0.3)]">Trust.</span></h1>
                                        <p className="text-zinc-300 text-lg md:text-xl mb-10 max-w-2xl mx-auto font-medium">Specializing in Chip-Level Repairs, MacBook Services, and Custom Gaming Builds.</p>
                                        <div className="flex flex-wrap justify-center gap-4">
                                            <a href="https://maps.app.goo.gl/xoYxYefyyWhst4RN6" target="_blank" className="bg-yellow-400 hover:bg-yellow-500 text-black px-8 py-4 rounded-full font-bold shadow-[0_0_20px_rgba(255,215,0,0.2)]">VISIT STORE</a>
                                            <button onClick={() => setCurrentView("tracking")} className="bg-white/10 hover:bg-white/20 border border-white/20 text-white px-8 py-4 rounded-full font-bold backdrop-blur-md">TRACK REPAIR</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-yellow-400 py-3 overflow-hidden border-y border-yellow-500">
                                    <div className="whitespace-nowrap inline-block animate-scroll-left text-black font-black tracking-widest text-lg">
                                          • CHIP LEVEL REPAIR • MACBOOK SPECIALIST • CUSTOM GAMING PCs • CCTV INSTALLATION • DATA RECOVERY • CHIP LEVEL REPAIR • MACBOOK SPECIALIST • CUSTOM GAMING PCs • CCTV INSTALLATION • DATA RECOVERY •
                                    </div>
                                </div>

                                <section className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24">
                                    <h2 className="text-4xl md:text-5xl font-black text-white mb-16 text-center">Our Core <span className="text-yellow-400">Expertise</span></h2>
                                    <div className="grid md:grid-cols-3 gap-8">
                                        <div className="bg-white/5 border border-white/10 backdrop-blur-lg p-10 rounded-[30px] hover:border-yellow-400/50 hover:bg-yellow-400/5 transition-all group hover:-translate-y-2">
                                            <div className="w-20 h-20 bg-yellow-400 text-black rounded-2xl flex items-center justify-center mb-8"><i className="fas fa-microchip text-3xl"></i></div>
                                            <h3 className="text-2xl font-bold text-white mb-4">Motherboard Repair</h3>
                                            <p className="text-zinc-400 font-medium leading-relaxed">IC replacement, short-circuit fixing, and precision micro-soldering for all laptop brands.</p>
                                        </div>
                                        <div className="bg-white/5 border border-white/10 backdrop-blur-lg p-10 rounded-[30px] hover:border-yellow-400/50 hover:bg-yellow-400/5 transition-all group hover:-translate-y-2">

                                                            <button onClick={() => updateQuantity(item.id, -1)} className="w-8 h-8 flex items-center justify-center text-white"><i className="fas fa-minus"></i></button>
                                                            <span className="w-8 text-center text-sm font-black">{item.quantity}</span>
                                                            <button onClick={() => updateQuantity(item.id, 1)} className="w-8 h-8 flex items-center justify-center text-white"><i className="fas fa-plus"></i></button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                {cart.length > 0 && (
                                    <div className="p-8 bg-black border-t border-white/10">
                                        <div className="flex justify-between items-center mb-6"><span className="text-zinc-400 font-bold uppercase">Subtotal</span><span className="text-3xl font-black text-yellow-400">{formatINR(cartTotal)}</span></div>
                                        <button onClick={() => setIsCheckoutModalOpen(true)} className="w-full bg-yellow-400 hover:bg-yellow-500 text-black py-4 rounded-2xl font-black text-lg shadow-[0_0_20px_rgba(255,215,0,0.2)]">Secure Checkout</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* FOOTER */}
                    <footer className="bg-[#03050d] text-zinc-400 py-16 border-t border-white/10 mt-auto">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 md:grid-cols-3 gap-12">
                            <div className="space-y-6"><BrandLogo /><p className="text-sm font-medium">Your one-stop destination for laptop sales, expert repairs, custom builds, and accessories.</p></div>
                            <div className="space-y-6"><h4 className="text-white font-black text-lg tracking-wide uppercase">Contact</h4>
                                <ul className="space-y-4">
                                    <li className="flex items-start gap-4"><i className="fas fa-map-marker-alt text-yellow-400 text-xl mt-1"></i><span className="text-sm font-medium">Annapurna Arcade, Above SBI Bank, PM Palem Main Road, Midhilapuri Vuda Layout, Madhurawada, AP 530041</span></li>
                                    <li className="flex items-center gap-4"><i className="fas fa-phone text-yellow-400 text-xl"></i><span className="text-sm font-bold text-white">+91 90598 95427</span></li>
                                </ul>
                            </div>
                            <div className="space-y-6"><h4 className="text-white font-black text-lg tracking-wide uppercase">Hours</h4>
                                <ul className="space-y-4">
                                    <li className="flex justify-between border-b border-white/10 pb-3"><span className="text-sm font-bold text-zinc-300">Mon - Sat</span><span className="text-sm font-black text-white">10:00 AM - 9:00 PM</span></li>
                                    <li className="flex justify-between"><span className="text-sm font-bold text-zinc-300">Sunday</span><span className="text-sm font-black text-yellow-400">Closed</span></li>
                                </ul>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-16 pt-8 border-t border-white/10 flex flex-col md:flex-row justify-between items-center gap-6">
                            <p className="text-sm font-bold">© {CURRENT_YEAR} Right Click Computers.</p>
                            <button onClick={() => setCurrentView(isAdminAuthenticated ? 'admin' : 'admin-login')} className="flex items-center gap-2 hover:text-yellow-400 text-sm font-bold bg-white/5 px-4 py-2 rounded-xl border border-white/10"><i className="fas fa-lock"></i> {isAdminAuthenticated ? "Staff Dashboard" : "Staff Login"}</button>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
